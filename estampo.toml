output_dir = "estampo_output"

[pipeline]
stages = ["load", "arrange", "plate", "slice", "pack"]

[plate]
size = [256, 256]

[slicer]
engine = "cura"
version = "5.12.0"

[slicer.cura]
printer = "bambox_p1s"
filaments = ["PLA"]

[slicer.cura.overrides]
speed_wall_0 = 30
hole_xy_offset = 0.1

[[parts]]
file = "test_plate_2.5mm.step"

[[parts]]
file = "test_plate_3.0mm.step"

[[parts]]
file = "test_plate_3.5mm.step"

[[parts]]
file = "test_plate_4.0mm.step"

[pack]
command = "bambox pack {sliced_dir}/plate.gcode -o {output_dir}/plate.gcode.3mf"
output = "{output_dir}/plate.gcode.3mf"
